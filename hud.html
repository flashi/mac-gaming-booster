<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: white;
            background: rgba(15, 15, 15, 0.82);
            margin: 0;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            overflow: hidden;
            user-select: none;
            backdrop-filter: blur(8px);
        }
        .header {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            color: #00ffcc;
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.5px;
        }
        .row {
            margin-bottom: 3px;
            display: flex;
            justify-content: space-between;
        }
        .label {
            color: #888;
        }
        .value {
            font-weight: 500;
        }
        .bold-value {
            font-weight: bold;
            color: #00ffaa;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 5px;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }
        #hud-kernel-status {
            font-weight: bold;
            font-size: 10px;
            letter-spacing: 0.3px;
            color: #aaaaaa;
        }
        @keyframes marquee {
            0% { transform: translateX(0%); }
            50% { transform: translateX(-50%); } /* Läuft sanft zur Mitte/Ende */
            100% { transform: translateX(0%); }
        }
    </style>
</head>
<body>
    <div class="header">
        <span>🚀 GAME BOOSTER HUD</span>
        <span id="ram-status" style="color:#00ff00;">● Live</span>
    </div>
    <div class="row">
        <span class="label">💾 Memory:</span>
        <span id="hud-ram-used" class="value">-- GB / -- GB</span>
    </div>
    <div class="row">
        <span class="label">🧹 Free Cache:</span>
        <span id="hud-ram-free" class="bold-value">-- MB</span>
    </div>
    <div style="margin-bottom:3px; display:flex; justify-content:space-between; align-items:center;">
    <span style="color:#888;">🎮 Game:</span>
    <div style="max-width:180px; overflow:hidden; white-space:nowrap; position:relative;">
        <span id="hud-game-name" class="bold-value" style="color:#ffffff; display:inline-block; font-weight:bold; animation: marquee 10s linear infinite;">None</span>
    </div>
    </div>
    <div class="row">
        <span class="label">🆔 Process:</span>
        <span id="hud-game-pid" style="color:#ffffff;">-</span>
    </div>
    <div class="footer">
        <span class="label">⚙️ Booster Engine:</span>
        <span id="hud-kernel-status"> White READY</span>
    </div>
</body>
</html>
